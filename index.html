<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Worth Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Net Worth Tracker</h1>
        <p>Get a clear snapshot of your wealth across all asset classes.</p>
    </header>

    <main>

        <section class="card" id="entry-section">
            <h2>Add an Asset</h2>
            <form id="asset-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="asset-type">Asset Type</label>
                        <select id="asset-type">
                            <!-- Populated by script.js -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="asset-name">Name / Label</label>
                        <input
                            type="text"
                            id="asset-name"
                            placeholder="e.g. AAPL, Vanguard S&P 500…"
                            autocomplete="off"
                        >
                    </div>
                    <div class="form-group">
                        <label for="asset-amount">Value ($)</label>
                        <input
                            type="number"
                            id="asset-amount"
                            placeholder="0.00"
                            min="0"
                            step="0.01"
                        >
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Asset</button>
            </form>
        </section>

        <section class="card" id="summary-section">
            <h2>Your Portfolio</h2>

            <div id="empty-state">
                <p>No assets added yet. Use the form above to get started.</p>
            </div>

            <table id="asset-table" class="hidden">
                <thead>
                    <tr>
                        <th>Asset Type</th>
                        <th>Label</th>
                        <th>Value</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="asset-tbody"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="2" class="total-label">Total Net Worth</td>
                        <td id="total-display" colspan="2">$0.00</td>
                    </tr>
                </tfoot>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
